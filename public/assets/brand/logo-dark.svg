<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" version="1.1">

  <rect width="900" height="700" fill="#000000"/>

  <!-- ══════════════════════════════════════════════════════════════
       ALL TRUNK STRANDS START AT (450, 525)
       This causes the lower ~100 px to read as one solid trunk.
       Strands begin curving at around y=415 toward their branch.
       ══════════════════════════════════════════════════════════════ -->

  <!-- LEFT BRANCH GROUP ─────────────────────────────────────────── -->

  <!-- Teal — biggest left curve, terminates at big leaf -->
  <path d="M 450,525  C 448,488  444,448  440,412
           C 432,368  400,334  360,316  C 326,302  294,308  278,328"
        fill="none" stroke="#2EC4A9" stroke-width="24" stroke-linecap="round"/>

  <!-- Pink — upper-left, treble-clef zone -->
  <path d="M 450,525  C 449,488  446,448  443,411
           C 436,366  414,322  386,283
           C 362,248  338,218  322,190  C 312,172  310,154  318,142"
        fill="none" stroke="#E85B8A" stroke-width="18" stroke-linecap="round"/>

  <!-- Green — film-reel zone -->
  <path d="M 450,525  C 449,488  447,448  444,411
           C 438,368  420,330  402,296  C 394,278  388,258  388,240"
        fill="none" stroke="#78C244" stroke-width="18" stroke-linecap="round"/>

  <!-- CENTER COLUMN ─────────────────────────────────────────────── -->

  <!-- Red — dominant centre strand -->
  <path d="M 450,525  C 450,488  450,448  450,411
           C 450,374  451,336  453,302  C 453,270  454,245  454,224"
        fill="none" stroke="#C42B1E" stroke-width="26" stroke-linecap="round"/>

  <!-- Amber — centre-right to crown -->
  <path d="M 450,525  C 451,488  453,448  456,411
           C 460,374  466,336  472,302  C 477,268  480,242  482,216
           C 483,196  483,176  481,162"
        fill="none" stroke="#D4A020" stroke-width="18" stroke-linecap="round"/>

  <!-- Purple — orb area -->
  <path d="M 450,525  C 452,488  455,448  460,411
           C 466,374  476,336  488,302  C 498,268  510,238  518,214
           C 522,198  522,184  520,172"
        fill="none" stroke="#8440B2" stroke-width="16" stroke-linecap="round"/>

  <!-- RIGHT BRANCH GROUP ────────────────────────────────────────── -->

  <!-- Cyan — spiral zone -->
  <path d="M 450,525  C 453,488  458,448  464,412
           C 472,368  490,328  514,294  C 534,264  556,246  572,238"
        fill="none" stroke="#2AB2D8" stroke-width="18" stroke-linecap="round"/>

  <!-- Navy — figure + leaves, far right -->
  <path d="M 450,525  C 454,488  462,448  470,412
           C 482,368  506,326  536,292  C 562,260  594,238  622,228"
        fill="none" stroke="#1D44C8" stroke-width="24" stroke-linecap="round"/>


  <!-- ══════════════════════════════════════════════════════════════
       CANOPY ELEMENTS — tightly packed, circular composition
       Canopy circle: centre (455, 290), radius ~225
       ══════════════════════════════════════════════════════════════ -->

  <!-- ─── BIG TEAL LEAF ──────────────────────────────────────────── -->
  <path d="M 278,330
           C 254,308  238,274  248,244
           C 258,212  290,200  316,218
           C 344,238  354,274  342,308
           C 330,340  302,354  278,330 Z"
        fill="#2EC4A9"/>
  <line x1="280" y1="330" x2="308" y2="220" stroke="#000000" stroke-width="2" opacity="0.17"/>
  <!-- small secondary teal leaf -->
  <path d="M 326,380
           C 308,362  302,340  314,324
           C 326,308  350,312  354,332
           C 358,350  342,376  326,380 Z"
        fill="#2EC4A9" opacity="0.85"/>

  <!-- ─── PINK TREBLE CLEF ────────────────────────────────────────── -->
  <!-- Lower loop -->
  <path d="M 322,272
           C 306,264  298,248  306,232
           C 314,216  334,212  344,226
           C 354,240  350,260  338,268
           C 328,274  316,272  312,262
           C 308,250  314,238  324,234"
        fill="none" stroke="#E85B8A" stroke-width="9" stroke-linecap="round"/>
  <!-- Stem upward -->
  <line x1="324" y1="234" x2="324" y2="155" stroke="#E85B8A" stroke-width="9"/>
  <!-- Top hook / curl -->
  <path d="M 324,155  C 320,138  330,126  342,130
           C 354,134  358,148  352,160
           C 346,170  334,170  328,162"
        fill="none" stroke="#E85B8A" stroke-width="9" stroke-linecap="round"/>
  <!-- Bottom scroll -->
  <path d="M 322,272  C 314,284  312,300  322,308
           C 332,316  346,310  346,299"
        fill="none" stroke="#E85B8A" stroke-width="9" stroke-linecap="round"/>

  <!-- ─── GREEN NOTES ───────────────────────────────────────────── -->
  <circle cx="360" cy="234" r="12" fill="#78C244"/>
  <circle cx="381" cy="222" r="12" fill="#78C244"/>
  <circle cx="403" cy="213" r="10" fill="#78C244"/>
  <line x1="372" y1="234" x2="372" y2="194" stroke="#78C244" stroke-width="5.5"/>
  <line x1="393" y1="222" x2="393" y2="180" stroke="#78C244" stroke-width="5.5"/>
  <line x1="372" y1="194" x2="403" y2="187" stroke="#78C244" stroke-width="4.5"/>

  <!-- ─── GREEN FILM REEL ──────────────────────────────────────── -->
  <!-- centre at (394, 312), r=50 -->
  <circle cx="394" cy="312" r="50" fill="none" stroke="#78C244" stroke-width="14"/>
  <circle cx="394" cy="312" r="18" fill="#78C244"/>
  <circle cx="394" cy="312" r="10" fill="#000000" opacity="0.38"/>
  <line x1="394" y1="294" x2="394" y2="262" stroke="#78C244" stroke-width="9"/>
  <line x1="412" y1="303" x2="436" y2="274" stroke="#78C244" stroke-width="9"/>
  <line x1="412" y1="321" x2="436" y2="350" stroke="#78C244" stroke-width="9"/>
  <line x1="394" y1="330" x2="394" y2="362" stroke="#78C244" stroke-width="9"/>
  <line x1="376" y1="321" x2="352" y2="350" stroke="#78C244" stroke-width="9"/>
  <line x1="376" y1="303" x2="352" y2="274" stroke="#78C244" stroke-width="9"/>
  <circle cx="394" cy="262" r="7" fill="#000000" opacity="0.38"/>
  <circle cx="444" cy="281" r="7" fill="#000000" opacity="0.38"/>
  <circle cx="444" cy="343" r="7" fill="#000000" opacity="0.38"/>
  <circle cx="394" cy="362" r="7" fill="#000000" opacity="0.38"/>
  <circle cx="344" cy="343" r="7" fill="#000000" opacity="0.38"/>
  <circle cx="344" cy="281" r="7" fill="#000000" opacity="0.38"/>

  <!-- Pink accent dots -->
  <circle cx="352" cy="372" r="13" fill="#E85B8A" opacity="0.85"/>
  <circle cx="344" cy="404" r="9"  fill="#E85B8A" opacity="0.65"/>

  <!-- ─── RED STARBURST (centre) ──────────────────────────────── -->
  <!-- 8-point flower / starburst -->
  <path d="M 454,238
           C 446,224  444,208  454,200  C 464,192  476,198  478,212
           C 488,202  502,200  508,212  C 514,224  506,236  494,238
           C 504,250  506,264  496,270  C 486,276  474,268  472,256
           C 462,268  450,272  442,264  C 434,256  438,242  452,238 Z"
        fill="#C42B1E"/>

  <!-- ─── AMBER SUNBURST CROWN (top centre) ───────────────────── -->
  <!-- Spiky ring -->
  <polygon points="481,170  474,148  488,158  495,134  502,158  516,148
                   509,170  528,166  516,184  534,187  520,203
                   530,220  512,214  509,234  495,222  481,234
                   478,214  460,220  470,203  456,187  474,184
                   462,166"
           fill="#D4A020"/>
  <circle cx="495" cy="188" r="26" fill="#D4A020"/>

  <!-- ─── PURPLE ACCENT DOT ───────────────────────────────────── -->
  <circle cx="520" cy="172" r="17" fill="#8440B2"/>
  <circle cx="514" cy="165" r="7"  fill="#8440B2" opacity="0.48"/>

  <!-- ─── CYAN NAUTILUS SPIRAL ────────────────────────────────── -->
  <path d="M 572,240
           C 594,218  602,190  586,170
           C 570,150  544,152  534,170
           C 524,190  534,212  552,222
           C 570,232  592,222  590,200
           C 588,182  572,170  558,180
           C 546,190  546,206  558,214"
        fill="none" stroke="#2AB2D8" stroke-width="16" stroke-linecap="round"/>
  <path d="M 558,214  C 550,222  550,236  560,244"
        fill="none" stroke="#2AB2D8" stroke-width="11" stroke-linecap="round"/>
  <!-- small teal tear drop -->
  <path d="M 580,258
           C 570,240  568,216  582,204
           C 596,192  614,202  614,220
           C 614,240  596,268  580,258 Z"
        fill="#2AB2D8" opacity="0.80"/>

  <!-- ─── BLUE OAK LEAF ──────────────────────────────────────── -->
  <path d="M 622,200
           C 610,178  598,154  610,130
           C 622,106  648,104  658,124
           C 665,138  660,156  648,163
           C 661,156  676,152  682,168
           C 688,184  676,202  660,204
           C 672,216  672,236  662,244
           C 652,252  636,244  628,230
           C 619,244  610,252  600,244
           C 590,236  595,216  610,205 Z"
        fill="#1D44C8"/>

  <!-- ─── DARK-BLUE HUMAN FIGURE ──────────────────────────────── -->
  <circle cx="646" cy="272" r="18" fill="#1D44C8"/>
  <path d="M 631,290  L 607,274" stroke="#1D44C8" stroke-width="15" stroke-linecap="round"/>
  <path d="M 661,290  L 685,274" stroke="#1D44C8" stroke-width="15" stroke-linecap="round"/>
  <path d="M 638,293
           C 618,312  617,342  633,356
           C 649,370  674,365  680,347
           C 686,328  678,304  662,292 Z"
        fill="#1D44C8"/>
  <!-- Navy accent leaf -->
  <path d="M 684,318
           C 702,298  726,292  732,308
           C 738,324  724,344  706,346
           C 688,348  674,332  684,318 Z"
        fill="#1B8FD0" opacity="0.90"/>


  <!-- ══════════════════════════════════════════════════════════════
       GROUND + TYPOGRAPHY
       ══════════════════════════════════════════════════════════════ -->

  <path d="M 352,538  Q 402,551  454,538  Q 506,525  558,538"
        fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.65"/>

  <text x="452" y="604"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="54" font-weight="bold" letter-spacing="7"
        text-anchor="middle" fill="#C9A84C">REBUILT VILLAGE</text>

  <line x1="155" y1="624" x2="336" y2="624" stroke="#C9A84C" stroke-width="1.3"/>
  <line x1="570" y1="624" x2="751" y2="624" stroke="#C9A84C" stroke-width="1.3"/>

  <text x="452" y="652"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="20" letter-spacing="1.5"
        text-anchor="middle" fill="#C9A84C">Rebuilding Community Through Art</text>

  <line x1="155" y1="664" x2="751" y2="664" stroke="#C9A84C" stroke-width="1.3"/>

</svg>