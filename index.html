  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "url": "https://rebuiltvillage.org/faq",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is Rebuilt Village?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Rebuilt Village, Inc. is a 501(c)(3) nonprofit organization founded in January 2025 in Ocoee, Florida. Our mission is to enrich the community by telling stories through the art of film and media, empowering local youth to capture and preserve deeply personal narratives. We were born from Rebuilt Minds, an Orlando-based production company."
        }
      },
      {
        "@type": "Question",
        "name": "Are donations to Rebuilt Village tax-deductible?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Rebuilt Village, Inc. is a 501(c)(3) organization and your contribution is tax-deductible to the full extent permitted by law. After each donation you will receive an official tax receipt by email with the relevant details for your records."
        }
      },
      {
        "@type": "Question",
        "name": "What programs does Rebuilt Village offer?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We offer three core programs: a two-week Summer Cinematography Camp for youth ages 14–18 (held at John H. Jackson Community Center in Ocoee), ongoing Narrative Preservation Workshops open to all community members, and periodic masterclasses on topics like lighting, grip, and directing. All youth programs are completely free."
        }
      },
      {
        "@type": "Question",
        "name": "What is Film-apalooza?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Film-apalooza is a three-day community film festival held at Dr. Phillips High School in Orlando (May 15–17, 2026). It features community screenings, filmmaker panels, hands-on workshops, and an awards ceremony. Rebuilt Village is a proud sponsor and the event is open to all ages."
        }
      },
      {
        "@type": "Question",
        "name": "How do I enroll my child in the Summer Camp?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Enrollment information for the 2026 Summer Camp (July 13–24 at John H. Jackson Community Center) will be announced via our events calendar and social media. Contact us at hello@rebuiltvillage.org to express interest and be notified when applications open. All youth programs are free and open to Ocoee-area youth ages 14–18."
        }
      },
      {
        "@type": "Question",
        "name": "How is my donation used?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "85% of all funds go directly to programs — equipment, facility costs, instructor stipends, and student materials. The remaining 15% covers operational costs. You can give to the General Operating Fund or direct your gift to a specific restricted project: the Film Equipment Fund, Youth Scholarship Fund, Summer Camp Launch, or Film-apalooza sponsorship."
        }
      },
      {
        "@type": "Question",
        "name": "Can I make a recurring monthly donation?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Monthly recurring donations are available on the Donate page. Gifts are processed via Stripe and can be cancelled at any time by contacting us at hello@rebuiltvillage.org."
        }
      },
      {
        "@type": "Question",
        "name": "Where is Rebuilt Village located?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We are based in Ocoee, Florida (Orange County). Our primary programming partner is the John H. Jackson Community Center in Ocoee. We also partner with Dr. Phillips High School in Orlando for annual events."
        }
      }
    ]
  }
  </script>
