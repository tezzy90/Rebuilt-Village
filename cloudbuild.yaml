steps:
  # Install frontend dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install-frontend'

  # Install functions dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    dir: 'functions'
    id: 'install-functions'

  # Build frontend
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    env:
      - 'VITE_FIREBASE_PROJECT_ID=$PROJECT_ID'
      - 'VITE_STRIPE_PUBLIC_KEY=${_STRIPE_PUBLIC_KEY}'
      - 'VITE_SANITY_PROJECT_ID=${_SANITY_PROJECT_ID}'
      - 'VITE_SANITY_DATASET=${_SANITY_DATASET}'
      - 'VITE_GA_MEASUREMENT_ID=${_GA_MEASUREMENT_ID}'
    id: 'build-frontend'
    waitFor: ['install-frontend']

  # Build Cloud Functions
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'functions'
    id: 'build-functions'
    waitFor: ['install-functions']

  # Deploy to Firebase (hosting + functions)
  - name: 'gcr.io/firebase-tools/firebase-tools'
    args:
      - 'deploy'
      - '--project'
      - '$PROJECT_ID'
      - '--only'
      - 'hosting,functions'
      - '--message'
      - 'Build $BUILD_ID from $REPO_NAME@$SHORT_SHA'
    id: 'firebase-deploy'
    waitFor: ['build-frontend', 'build-functions']
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: 'FIREBASE_TOKEN'

substitutions:
  _STRIPE_PUBLIC_KEY: ''
  _SANITY_PROJECT_ID: ''
  _SANITY_DATASET: 'production'
  _GA_MEASUREMENT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
